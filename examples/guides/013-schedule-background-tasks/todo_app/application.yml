  #   enabled: false
  #   intercept-url-map:
  #     - pattern: /api/**
  #       access: [isAuthenticated()]
  #     - pattern: /public/**
  #       access: [permitAll()]
  # websocket:
  #   enabled: false
  #   auth: false

# ─── HTTP Server ──────────────────────────────────────────────────────────────
server:
  host: 0.0.0.0                     # Bind address
  port: 8080                        # Listen port

