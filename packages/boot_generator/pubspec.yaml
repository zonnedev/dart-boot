name: boot_generator
description: Code generators for the Boot framework.
repository: https://github.com/jfsanchez/dart-boot/tree/main/packages/boot_generator
version: 0.1.1

environment:
  sdk: ^3.5.0

resolution: workspace

dependencies:
  boot_core:
    path: ../boot_core
  boot_aop:
    path: ../boot_aop
  boot_events:
    path: ../boot_events
  boot_scheduling:
    path: ../boot_scheduling
  boot_http:
    path: ../boot_http
  boot_http_common:
    path: ../boot_http_common
  boot_http_client:
    path: ../boot_http_client
  boot_serialization:
    path: ../boot_serialization
  build: ^2.4.0
  source_gen: ^2.0.0
  analyzer: ^7.0.0
  glob: ^2.1.0
  yaml: ^3.1.0

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^2.2.0
  source_gen_test: ^1.0.0
  test: ^1.25.0
